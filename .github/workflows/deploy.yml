name: Glance Build & Deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_test:
    name: Build and Test Flutter App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Run Tests
        run: flutter test
        continue-on-error: true

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: glance-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Commit and Push APK back to Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/app-release.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/app-release.apk
          if git diff --staged --quiet; then
            echo "No changes in APK"
          else
            git commit -m "chore: Update pre-compiled release APK [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
